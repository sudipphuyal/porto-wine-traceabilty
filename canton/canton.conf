# Local development template for Canton Domain / Synchronizer testing.
# This file intentionally stays simple because the installed Canton binary was
# unavailable in this environment and exact configuration keys vary by version.
# Validate and adjust with the examples shipped with your local Canton release.

canton {
  participants {
    localParticipant {
      storage.type = memory
      admin-api.port = 5012
      ledger-api.port = 5011
    }
  }

  domains {
    localDomain {
      storage.type = memory
      public-api.port = 5018
      admin-api.port = 5019
    }
  }
}
